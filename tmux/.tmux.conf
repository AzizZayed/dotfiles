# Enable True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g allow-passthrough on

# Set default shell to nu if it exists, otherwise fallback to OS default
run-shell 'tmux set -g default-shell "$(command -v nu 2>/dev/null || echo $SHELL)"'
set-environment -g XDG_CONFIG_HOME "$HOME/.config"

set -g set-clipboard on # Enable system clipboard integration

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane
bind v copy-mode

unbind r
bind r source-file $HOME/.tmux.conf \; display "Reloaded tmux config"

# Set prefix key to Ctrl-b
set -g prefix C-b
set -g mouse on

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind + split-window -v -c "#{pane_current_path}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# tmux config
set -g status-position bottom
set -g status-justify "left"

# Use current directory as window name instead of hostname
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# TPM: Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # prefix + Ctrl-s to save, prefix + Ctrl-r to restore
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux'

# Auto save sessions
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5' # Save every 5 minutes
set -g @continuum-boot-options 'kitty,fullscreen'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Catppuccin theme settings
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text " #{window_name}#{?window_zoomed_flag, Z,}"
set -g @catppuccin_window_current_text " #{window_name}#{?window_zoomed_flag, Z,}"

run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status bar configuration
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'

